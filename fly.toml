# Fly.io deployment configuration
# https://fly.io/docs/reference/configuration/

app = "tender-extract"
primary_region = "fra"  # Frankfurt

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  
  # Extended timeouts for PDF extraction (5 minutes)
  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[http_service.http_options]
  response_header_timeout = 300  # 5 minutes

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
